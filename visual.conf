# Yozakura visual config groups
# Used by bin/install.js — do not edit manually

# [1] 主题
theme = dark:Yozakura,light:Sakura

# [2] 毛玻璃
background-opacity = 0.88
background-blur-radius = 20

# [3] 排版
font-size = 15
font-thicken = true
adjust-cell-height = 20%

# [4] CJK 字体
font-codepoint-map = U+4E00-U+9FFF=PingFang SC
font-codepoint-map = U+3400-U+4DBF=PingFang SC
font-codepoint-map = U+3000-U+303F=PingFang SC
font-codepoint-map = U+FF00-U+FFEF=PingFang SC

# [5] 窗口
window-padding-x = 16
window-padding-y = 16
window-decoration = true
macos-titlebar-style = tabs

# [6] 光标
cursor-style = bar
cursor-style-blink = false
minimum-contrast = 1.0
